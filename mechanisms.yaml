# mechanisms.yaml
#
# Declarative manifest of every mechanism in this repo.
# Source of truth: ~/myOS/CLAUDE.md "How We Work" section.
#
# This file is the ground truth for automated parity checks between the
# private HWW section in myOS and the public mechanism catalog here.
# A parity gate (see ~/myOS/scripts/check-hww-parity.py) asserts that
# every HWW entry has a corresponding manifest entry and file.
#
# Supersedes the "Future prevention" section of CC-101.
# Tracking ticket: CC-104.

version: 1
updated: 2026-05-09
# v0.4.0 cross-link extends implementations: on #17 with feedback-memory-gate
# and on #5 (Linear ref IS the persistent marker). See claude-mechanisms-tools/
# CHANGELOG.md v0.4.0.
hww_source: CLAUDE.md  # in myOS repo; the "How We Work" section is the source of truth
implementations_source: github.com/christophecapel/claude-mechanisms-tools  # paired tools repo
release_pair: v0.4.0  # claude-mechanisms-tools release implementing entries below

